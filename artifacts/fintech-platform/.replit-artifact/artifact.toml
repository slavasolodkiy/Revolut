kind = "web"
previewPath = "/"
title = "Revolut Reference Platform"
version = "1.0.0"
id = "artifacts/fintech-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21975

[services.development]
run = "pnpm --filter @workspace/fintech-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fintech-platform", "run", "build" ]
publicDir = "artifacts/fintech-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21975"
BASE_PATH = "/"
